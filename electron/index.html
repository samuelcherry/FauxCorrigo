<!doctype html>
<html>
  <head>
    <title>Ticket Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="widgetTray">
      <div class="widget" style="background-color: rgb(39, 210, 39)">
        Low<span id="low" style="font-size: 2rem; font-weight: 800">0</span>
      </div>
      <div class="widget" style="background-color: rgb(247, 255, 21)">
        Medium<span id="medium" style="font-size: 2rem; font-weight: 800"
          >0</span
        >
      </div>
      <div class="widget" style="background-color: rgb(255, 149, 0)">
        High<span id="high" style="font-size: 2rem; font-weight: 800">0</span>
      </div>
      <div class="widget" style="background-color: rgb(210, 39, 39)">
        Urgent<span id="urgent" style="font-size: 2rem; font-weight: 800"
          >0</span
        >
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
